<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Port Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #0a0a1a; color: #eee; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #00d4ff, #0066ff); padding: 30px; text-align: center; }
        .header h1 { font-size: 2rem; color: white; }
        .header p { color: rgba(255,255,255,0.8); margin-top: 5px; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .scan-box { background: #16213e; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #00d4ff; font-weight: bold; }
        input { width: 100%; padding: 10px; background: #0a0a1a; border: 1px solid #00d4ff; 
                border-radius: 6px; color: #eee; font-size: 14px; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #00d4ff, #0066ff);
               border: none; border-radius: 6px; color: white; font-size: 16px; 
               font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .results { background: #16213e; border-radius: 12px; padding: 30px; display: none; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #0a0a1a; border-radius: 8px; padding: 15px; text-align: center; }
        .stat-card h3 { color: #00d4ff; font-size: 1.8rem; }
        .stat-card p { color: #888; font-size: 12px; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #00d4ff; color: #000; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #1a1a3e; }
        tr:hover { background: #0a0a1a; }
        .open { color: #00ff88; font-weight: bold; }
        .loading { text-align: center; padding: 20px; color: #00d4ff; display: none; }
        .spinner { border: 3px solid #1a1a3e; border-top: 3px solid #00d4ff; 
                   border-radius: 50%; width: 40px; height: 40px; 
                   animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 Network Port Scanner</h1>
        <p>Advanced Port Scanner with Service Detection</p>
    </div>

    <div class="container">
        <div class="scan-box">
            <div class="form-group">
                <label>Target IP / Hostname</label>
                <input type="text" id="target" placeholder="e.g. 127.0.0.1" value="127.0.0.1">
            </div>
            <div class="form-group">
                <label>Start Port</label>
                <input type="number" id="start" placeholder="e.g. 1" value="1">
            </div>
            <div class="form-group">
                <label>End Port</label>
                <input type="number" id="end" placeholder="e.g. 500" value="500">
            </div>
            <button class="btn" id="scanBtn" onclick="startScan()">🚀 Start Scan</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Scanning ports... Please wait...</p>
        </div>

        <div class="results" id="results">
            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalOpen">0</h3>
                    <p>Open Ports</p>
                </div>
                <div class="stat-card">
                    <h3 id="duration">0s</h3>
                    <p>Scan Duration</p>
                </div>
                <div class="stat-card">
                    <h3 id="targetDisplay">-</h3>
                    <p>Target</p>
                </div>
            </div>
            <table>
                <thead>
                    <tr><th>Port</th><th>Status</th><th>Service</th></tr>
                </thead>
                <tbody id="resultsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function startScan() {
            const target = document.getElementById("target").value;
            const start = document.getElementById("start").value;
            const end = document.getElementById("end").value;
            const btn = document.getElementById("scanBtn");

            btn.disabled = true;
            btn.textContent = "Scanning...";
            document.getElementById("loading").style.display = "block";
            document.getElementById("results").style.display = "none";

            try {
                const response = await fetch("/scan", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ target, start, end })
                });

                const data = await response.json();

                document.getElementById("totalOpen").textContent = data.total_open;
                document.getElementById("duration").textContent = data.duration + "s";
                document.getElementById("targetDisplay").textContent = data.target;

                const tbody = document.getElementById("resultsTable");
                tbody.innerHTML = "";

                if (data.results.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='3' style='text-align:center; color:#888'>No open ports found</td></tr>";
                } else {
                    data.results.forEach(r => {
                        tbody.innerHTML += `<tr>
                            <td>${r.port}</td>
                            <td class="open">OPEN ✓</td>
                            <td>${r.service}</td>
                        </tr>`;
                    });
                }

                document.getElementById("loading").style.display = "none";
                document.getElementById("results").style.display = "block";

            } catch (error) {
                alert("Error: " + error.message);
            }

            btn.disabled = false;
            btn.textContent = "🚀 Start Scan";
        }
    </script>
</body>
</html>
